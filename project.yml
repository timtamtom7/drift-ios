name: Drift
options:
  bundleIdPrefix: com.drift
  deploymentTarget:
    iOS: "26.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    version: 0.15.3

targets:
  Drift:
    type: application
    platform: iOS
    sources:
      - path: Drift/Sources
      - path: Drift/Resources
    settings:
      base:
        INFOPLIST_FILE: Drift/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.drift.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Drift/Resources/Drift.entitlements
    dependencies:
      - package: SQLite
    entitlements:
      path: Drift/Resources/Drift.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  DriftWatch:
    type: application
    platform: watchOS
    sources:
      - path: DriftWatch/Sources
      - path: DriftWatch/Resources
    settings:
      base:
        INFOPLIST_FILE: DriftWatch/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.drift.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DriftWatch/Resources/DriftWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: "4"
    entitlements:
      path: DriftWatch/Resources/DriftWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  DriftMac:
    type: application
    platform: macOS
    sources:
      - path: DriftMac/Sources
      - path: DriftMac/Services
      - path: DriftMac/Resources
    settings:
      base:
        INFOPLIST_FILE: DriftMac/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.drift.app.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        COMBINE_HIDPI_IMAGES: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - package: SQLite
    entitlements:
      path: DriftMac/Resources/DriftMac.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.app-sandbox: true
